<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Paytone+One&family=Outfit:wght@600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0; width: 1920px; height: 1080px; overflow: hidden;
        background: #f9f4da;
        font-family: "Outfit", sans-serif;
      }
      .row { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 28px; padding: 0 100px; }
      .node {
        border: 5px solid #231f20;
        border-radius: 16px;
        box-shadow: 7px 7px 0 #231f20;
        background: #fff;
        padding: 32px 36px;
        font-family: "Outfit", sans-serif;
        font-weight: 700;
        font-size: 40px;
        color: #231f20;
        text-align: center;
        max-width: 400px;
        opacity: 0;
        transform: scale(0.85);
      }
      .node.n0 { background: #fcba28; }
      .arrow { font-size: 56px; color: #231f20; opacity: 0; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="4.4" data-width="1920" data-height="1080">
      <div class="row">
        <div id="node0" class="node n0 clip" data-start="0" data-duration="4.4" data-track-index="1">WhatsApp</div>
        <div id="arrow0" class="arrow clip" data-start="0" data-duration="4.4" data-track-index="2">→</div>
        <div id="node1" class="node clip" data-start="0" data-duration="4.4" data-track-index="3">Orquestador</div>
        <div id="arrow1" class="arrow clip" data-start="0" data-duration="4.4" data-track-index="4">→</div>
        <div id="node2" class="node clip" data-start="0" data-duration="4.4" data-track-index="5">Agente con<br/>memoria</div>
        <div id="arrow2" class="arrow clip" data-start="0" data-duration="4.4" data-track-index="6">→</div>
        <div id="node3" class="node clip" data-start="0" data-duration="4.4" data-track-index="7">Tus sistemas</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      function pop(id, t) { tl.to(id, { opacity: 1, scale: 1, duration: 0.35, ease: "back.out(2)" }, t); }
      function fade(id, t) { tl.to(id, { opacity: 1, duration: 0.2 }, t); }
      pop("#node0", 0.15);
      fade("#arrow0", 0.55);
      pop("#node1", 0.75);
      fade("#arrow1", 1.15);
      pop("#node2", 1.35);
      fade("#arrow2", 1.75);
      pop("#node3", 1.95);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
